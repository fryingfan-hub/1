<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Made by tipane</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #090b0e;
            background-image: 
                radial-gradient(circle at 50% 45%, rgba(255, 235, 200, 0.06) 0%, transparent 65%),
                radial-gradient(circle at 50% 50%, #11151d 0%, #07090c 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none; 
        }

        #overlay-ui {
            position: absolute;
            bottom: 8vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transform: translateY(20px);
            animation: elegantFadeIn 3.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 0.5s;
            text-align: center;
            padding: 0 20px;
            max-width: 600px;
        }

        .name-title {
            font-family: 'Great Vibes', cursive;
            font-size: calc(2.6rem + 2.5vw);
            font-weight: 400;
            color: #ffffff;
            letter-spacing: 1px;
            -webkit-text-stroke: 0.5px rgba(9, 11, 14, 0.5);
            text-shadow: 
                0 0 20px rgba(255, 214, 165, 0.6),
                0 0 40px rgba(255, 255, 255, 0.3),
                0 4px 15px rgba(0, 0, 0, 0.6);
            animation: softGlowPulse 5s ease-in-out infinite alternate;
        }

        .sub-text {
            font-size: calc(0.6rem + 0.25vw);
            text-transform: uppercase;
            letter-spacing: 0.35em;
            color: #94a3b8;
            font-weight: 600;
            margin-top: 12px;
            line-height: 1.6;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
        }

        .quote-author {
            font-size: calc(0.45rem + 0.2vw);
            letter-spacing: 0.5em;
            color: #64748b;
            margin-top: 8px;
            font-weight: 400;
        }

        @keyframes elegantFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes softGlowPulse {
            0% {
                text-shadow: 0 0 15px rgba(255, 214, 165, 0.4), 0 0 25px rgba(255, 255, 255, 0.2), 0 4px 8px rgba(0, 0, 0, 0.5);
                transform: scale(0.99);
            }
            100% {
                text-shadow: 0 0 25px rgba(255, 214, 165, 0.85), 0 0 45px rgba(255, 255, 255, 0.5), 0 4px 20px rgba(0, 0, 0, 0.7);
                transform: scale(1.01);
            }
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="lilyCanvas"></canvas>
    </div>

    <div id="overlay-ui">
        <h1 class="name-title">For Lex</h1>
        <p class="sub-text">“There is nothing either good or bad, but thinking makes it so.”</p>
        <p class="quote-author">— William Shakespeare, Hamlet</p>
    </div>

    <script>
        const canvas = document.getElementById('lilyCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, cx, cy, baseScale;
        let time = 0;
        let flowers = [];
        let backgroundLeaves = [];
        const particles = [];
        const fallingPetals = [];
        const ripples = [];
        
        const pointer = { x: 0, y: 0, targetX: 0, targetY: 0 };
        let globalBloom = { current: 0, target: 1, speed: 0.008 };
        let isTouched = false;

        const STRUCTURAL_PALETTE = {
            stamenFilament: 'rgba(190, 225, 165, 0.85)', 
            antherRust: '#7e2a16', 
            antherGlow: '#b84a2f',
            stemColor: '#3d563b',
            stemShadow: '#223221',
            leafGreen: '#2e452c',
            leafLight: '#44633f',
            paperBase: 'rgba(235, 223, 203, 0.07)',
            paperEdge: 'rgba(255, 245, 230, 0.15)',
            ribbonColor: '#e2e8f0',
            ribbonShadow: '#788b9c'
        };

        const FLOWER_COLORS = {
            white: {
                petalPure: '#ffffff',
                petalBackShade: '#f3f6f2',
                petalThroat: '#dee8cc', 
                spotColor: '#8a3324'
            },
            pink: {
                petalPure: '#ffccd5',
                petalBackShade: '#fca1b0',
                petalThroat: '#f78fa7', 
                spotColor: '#601020'
            },
            yellow: {
                petalPure: '#fff2b2',
                petalBackShade: '#ffe066',
                petalThroat: '#ffd633', 
                spotColor: '#a66100'
            }
        };

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            cx = width / 2;
            cy = height * 0.40; 

            baseScale = Math.min(width, height) * 0.15;
            if (width < 500) baseScale = Math.min(width, height) * 0.20; 

            if (!isTouched) {
                pointer.x = pointer.targetX = cx;
                pointer.y = pointer.targetY = cy;
            }

            initBouquet();
        }

        class PollenParticle {
            constructor() { this.reset(true); }
            reset(initAll = false) {
                this.x = Math.random() * width;
                this.y = initAll ? Math.random() * height : height + 20;
                this.size = Math.random() * 1.8 + 0.5;
                this.speedY = -(Math.random() * 0.35 + 0.15);
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                this.wobbleValue = Math.random() * Math.PI;
                this.alpha = Math.random() * 0.4 + 0.2;
                this.color = Math.random() > 0.4 ? STRUCTURAL_PALETTE.antherGlow : '#ffeaa7';
            }
            update() {
                this.y += this.speedY;
                this.wobbleValue += this.wobbleSpeed;
                
                let interactionX = 0;
                if (isTouched) {
                    const dx = pointer.x - this.x;
                    if (Math.abs(dx) < 180) interactionX = dx * 0.002;
                }

                this.x += this.speedX + Math.sin(this.wobbleValue) * 0.08 + interactionX;
                this.alphaPulse = this.alpha + Math.sin(time * 8 + this.wobbleValue) * 0.12;

                if (this.y < -10 || this.x < -10 || this.x > width + 10) this.reset(false);
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0.05, Math.min(1, this.alphaPulse));
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 5;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class FallingPetal {
            constructor() { this.reset(true); }
            reset(initAll = false) {
                this.x = Math.random() * width;
                this.y = initAll ? Math.random() * (height * 0.8) - 50 : -20;
                this.size = Math.random() * 6 + 6;
                this.speedY = Math.random() * 0.4 + 0.3;
                this.speedX = (Math.random() - 0.3) * 0.4;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.02;
                this.swingSpeed = Math.random() * 0.02 + 0.01;
                this.swingValue = Math.random() * Math.PI;
                this.alpha = Math.random() * 0.3 + 0.3;
            }
            update() {
                this.y += this.speedY;
                this.swingValue += this.swingSpeed;
                this.x += this.speedX + Math.sin(this.swingValue) * 0.3;
                this.rotation += this.rotSpeed;
                if (this.y > height + 20 || this.x < -20 || this.x > width + 20) this.reset(false);
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha;
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size/2, this.size/2, -this.size/3, this.size*1.3, 0, this.size*1.5);
                ctx.bezierCurveTo(this.size/3, this.size*1.3, this.size/2, this.size/2, 0, 0);
                
                const grad = ctx.createLinearGradient(0, 0, 0, this.size*1.5);
                grad.addColorStop(0, '#ffccd5');
                grad.addColorStop(1, '#fca1b0');
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.restore();
            }
        }

        function createRipple(x, y) {
            if (ripples.length > 4) ripples.shift();
            ripples.push({
                x, y,
                radius: 5,
                maxRadius: Math.random() * 40 + 50,
                alpha: 0.5,
                speed: 1.5
            });
        }

        function drawRipples() {
            ripples.forEach((r, i) => {
                r.radius += r.speed;
                r.alpha -= 0.012;
                if (r.alpha <= 0) {
                    ripples.splice(i, 1);
                    return;
                }
                ctx.save();
                ctx.globalAlpha = r.alpha;
                ctx.strokeStyle = '#ffd633';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            });
        }

        function createLilyStructure(offsetX, offsetY, scaleMod, rotationOffset, zIndex, flowerType) {
            const petals = [];
            const stamens = [];
            const localScale = baseScale * scaleMod;

            for (let i = 0; i < 6; i++) {
                const baseAngle = (i / 6) * Math.PI * 2 + rotationOffset;
                const spots = [];
                for(let j=0; j < 25; j++) {
                    spots.push({
                        u: Math.random() * 0.4 + 0.15, 
                        v: (Math.random() - 0.5) * 0.3,
                        r: Math.random() * 1.2 + 0.5
                    });
                }
                petets = petals.push({
                    index: i,
                    angle: baseAngle,
                    length: localScale * (i % 2 === 0 ? 1.05 : 0.95), 
                    width: localScale * (i % 2 === 0 ? 0.44 : 0.38),
                    springVal: 0, springTarget: 0, springVel: 0,
                    waveOffset: Math.random() * Math.PI,
                    tilt: i % 2 === 0 ? 0.15 : 0.08,
                    spots: spots
                });
            }

            for (let i = 0; i < 6; i++) {
                const baseAngle = ((i + 0.5) / 6) * Math.PI * 2 + rotationOffset;
                stamens.push({
                    angle: baseAngle,
                    length: localScale * 0.65,
                    spread: 0.20 + (Math.random() * 0.05),
                    antherRotation: (Math.random() - 0.5) * 0.6
                });
            }

            return { offsetX, offsetY, scale: localScale, petals, stamens, zIndex, angleOffset: rotationOffset, type: flowerType };
        }

        function initBouquet() {
            flowers = [
                createLilyStructure(-baseScale * 0.9, -baseScale * 0.4, 0.9, -0.4, 0, 'pink'),
                createLilyStructure(baseScale * 0.9, -baseScale * 0.3, 0.85, 0.5, 1, 'yellow'),
                createLilyStructure(-baseScale * 1.1, baseScale * 0.4, 0.95, -0.2, 2, 'white'),
                createLilyStructure(baseScale * 1.0, baseScale * 0.5, 0.9, 0.3, 3, 'pink'),
                createLilyStructure(0, -baseScale * 0.2, 1.1, 0.1, 4, 'yellow'),
                createLilyStructure(-baseScale * 0.4, baseScale * 0.9, 1.05, -0.1, 5, 'white'),
                createLilyStructure(baseScale * 0.5, baseScale * 1.0, 1.0, 0.2, 6, 'pink')
            ];

            flowers.sort((a, b) => a.zIndex - b.zIndex);

            backgroundLeaves = [];
            for (let i = 0; i < 14; i++) {
                backgroundLeaves.push({
                    angle: (i / 14) * Math.PI * 2 + Math.random() * 0.3,
                    length: baseScale * (1.3 + Math.random() * 0.5),
                    width: baseScale * (0.25 + Math.random() * 0.12),
                    swaySpeed: 0.4 + Math.random() * 0.4,
                    phase: Math.random() * Math.PI
                });
            }

            if (particles.length === 0) {
                const count = window.innerWidth < 500 ? 30 : 65;
                for (let i = 0; i < count; i++) particles.push(new PollenParticle());
            }

            if (fallingPetals.length === 0) {
                for (let i = 0; i < 8; i++) fallingPetals.push(new FallingPetal());
            }
        }

        function drawLeaves(swayX, swayY) {
            ctx.save();
            backgroundLeaves.forEach(leaf => {
                ctx.save();
                ctx.translate(cx + swayX * 0.3, cy + baseScale * 0.3 + swayY * 0.3);
                ctx.rotate(leaf.angle + Math.sin(time * leaf.swaySpeed + leaf.phase) * 0.04);

                const len = leaf.length * globalBloom.current;
                const w = leaf.width * globalBloom.current;

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(-w, len * 0.4, 0, len);
                ctx.quadraticCurveTo(w, len * 0.4, 0, 0);
                
                const grad = ctx.createLinearGradient(0, 0, 0, len);
                grad.addColorStop(0, STRUCTURAL_PALETTE.leafGreen);
                grad.addColorStop(1, '#141f13');

                ctx.fillStyle = grad;
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, len);
                ctx.strokeStyle = STRUCTURAL_PALETTE.leafLight;
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.restore();
            });
            ctx.restore();
        }

        function drawStem(f, swayX, swayY) {
            ctx.save();
            ctx.beginPath();
            
            const fx = cx + f.offsetX + swayX * 0.5;
            const fy = cy + f.offsetY + swayY * 0.5;
            const startX = cx + (f.offsetX * 0.15);
            const startY = height * 0.85;

            ctx.moveTo(startX, startY);
            ctx.bezierCurveTo(
                cx + (f.offsetX * 0.3), height * 0.7,
                fx - (swayX * 0.1), fy + (f.scale * 0.8),
                fx, fy
            );

            const gradient = ctx.createLinearGradient(startX, startY, fx, fy);
            gradient.addColorStop(0, STRUCTURAL_PALETTE.stemShadow);
            gradient.addColorStop(1, STRUCTURAL_PALETTE.stemColor);

            ctx.lineWidth = Math.max(3.5, f.scale * 0.05);
            ctx.strokeStyle = gradient;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.restore();
        }

        function drawPetal(f, petal, fx, fy, swayX, swayY, bFactor) {
            ctx.save();
            ctx.translate(fx, fy);
            ctx.rotate(petal.angle);

            const currentSpring = petal.springVal;
            const len = petal.length * (0.35 + bFactor * 0.65);
            const w = petal.width * bFactor;

            const curlOutFactor = Math.sin(bFactor * Math.PI * 0.5);
            const cp1x = w * 0.85;
            const cp1y = len * 0.35;
            const cp2x = w * 0.4 + (currentSpring * 8);
            const cp2y = len * 0.82;
            
            const tipX = (Math.sin(time + petal.waveOffset) * 3) * (1 - bFactor);
            const tipY = len + (petal.tilt * len * (1 - curlOutFactor));

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-cp1x, cp1y, -cp2x, cp2y, tipX, tipY);
            ctx.bezierCurveTo(cp2x, cp2y, cp1x, cp1y, 0, 0);
            ctx.closePath();

            const scheme = FLOWER_COLORS[f.type];

            const gradient = ctx.createRadialGradient(0, len * 0.05, 1, 0, len * 0.3, len);
            gradient.addColorStop(0, scheme.petalThroat);
            gradient.addColorStop(0.3, scheme.petalPure);
            gradient.addColorStop(0.85, scheme.petalPure);
            gradient.addColorStop(1, scheme.petalBackShade);

            ctx.fillStyle = gradient;
            ctx.fill();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
            ctx.lineWidth = 0.8;
            ctx.stroke();

            if (bFactor > 0.35) {
                ctx.save();
                ctx.fillStyle = scheme.spotColor;
                ctx.globalAlpha = (bFactor - 0.35) * 1.1;
                petal.spots.forEach(spot => {
                    const sY = spot.u * len;
                    const factorAtY = spot.u;
                    const currentW = (factorAtY < 0.35) ? (cp1x * (factorAtY/0.35)) : cp1x - (cp1x - cp2x)*((factorAtY-0.35)/0.5);
                    const sX = spot.v * currentW * 1.1;
                    
                    ctx.beginPath();
                    ctx.arc(sX, sY, spot.r * bFactor, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.restore();
            }

            ctx.beginPath();
            ctx.moveTo(0, 5);
            ctx.quadraticCurveTo(tipX * 0.5, len * 0.5, tipX, len * 0.95);
            ctx.strokeStyle = f.type === 'white' ? 'rgba(175, 199, 153, 0.25)' : 'rgba(255, 255, 255, 0.25)';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            ctx.restore();
        }

        function drawStamen(f, stamen, fx, fy, swayX, swayY, bFactor) {
            if (bFactor < 0.2) return; 
            
            ctx.save();
            ctx.translate(fx, fy);
            ctx.rotate(stamen.angle);

            const sFactor = bFactor * globalBloom.current;
            const len = stamen.length * (0.4 + sFactor * 0.6);
            const spreadX = (stamen.spread * len * 0.4) * sFactor;
            const microSwayX = Math.sin(time + stamen.angle) * 1.5;

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(spreadX * 0.3, len * 0.4, spreadX + microSwayX, len);
            
            ctx.strokeStyle = STRUCTURAL_PALETTE.stamenFilament;
            ctx.lineWidth = Math.max(1.2, f.scale * 0.012);
            ctx.lineCap = 'round';
            ctx.stroke();

            ctx.save();
            ctx.translate(spreadX + microSwayX, len);
            ctx.rotate(stamen.antherRotation + (swayX * 0.02));

            const aW = Math.max(7, f.scale * 0.08) * sFactor;
            const aH = Math.max(3, f.scale * 0.028) * sFactor;

            const amberGrad = ctx.createLinearGradient(-aW/2, 0, aW/2, 0);
            amberGrad.addColorStop(0, '#4a1207');
            amberGrad.addColorStop(0.5, STRUCTURAL_PALETTE.antherRust);
            amberGrad.addColorStop(1, STRUCTURAL_PALETTE.antherGlow);

            ctx.fillStyle = amberGrad;
            ctx.fillRect(-aW / 2, -aH / 2, aW, aH);
            ctx.restore();
            ctx.restore();
        }

        function drawWrappingPaper() {
            ctx.save();
            
            ctx.fillStyle = STRUCTURAL_PALETTE.paperBase;
            ctx.strokeStyle = STRUCTURAL_PALETTE.paperEdge;
            ctx.lineWidth = 1.5;

            ctx.beginPath();
            ctx.moveTo(cx - baseScale * 2.8, cy + baseScale * 0.4);
            ctx.lineTo(cx + baseScale * 2.8, cy + baseScale * 0.4);
            ctx.lineTo(cx + baseScale * 1.0, height);
            ctx.lineTo(cx - baseScale * 1.0, height);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(cx - baseScale * 2.8, cy + baseScale * 0.4);
            ctx.lineTo(cx, height * 0.85);
            ctx.lineTo(cx + baseScale * 2.8, cy + baseScale * 0.4);
            ctx.strokeStyle = 'rgba(255,245,230,0.06)';
            ctx.stroke();

            const rx = cx;
            const ry = height * 0.82;
            const rw = baseScale * 0.52;

            ctx.shadowBlur = 12;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';

            ctx.fillStyle = STRUCTURAL_PALETTE.ribbonColor;
            ctx.beginPath();
            ctx.moveTo(rx - 5, ry);
            ctx.quadraticCurveTo(rx - rw * 0.8, ry + baseScale * 0.7, rx - rw * 0.6, ry + baseScale * 1.2);
            ctx.lineTo(rx - rw * 0.3, ry + baseScale * 1.15);
            ctx.quadraticCurveTo(rx - 2, ry + baseScale * 0.6, rx, ry);
            
            ctx.moveTo(rx + 5, ry);
            ctx.quadraticCurveTo(rx + rw * 0.8, ry + baseScale * 0.7, rx + rw * 0.7, ry + baseScale * 1.2);
            ctx.lineTo(rx + rw * 0.4, ry + baseScale * 1.15);
            ctx.quadraticCurveTo(rx + 2, ry + baseScale * 0.6, rx, ry);
            ctx.fill();

            ctx.beginPath();
            ctx.ellipse(rx - rw * 0.6, ry - 2, rw * 0.65, rw * 0.28, -0.15, 0, Math.PI * 2);
            ctx.ellipse(rx + rw * 0.6, ry - 2, rw * 0.65, rw * 0.28, 0.15, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = STRUCTURAL_PALETTE.ribbonShadow;
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.ellipse(rx - rw * 0.4, ry - 2, rw * 0.3, rw * 0.15, -0.15, 0, Math.PI * 2);
            ctx.ellipse(rx + rw * 0.4, ry - 2, rw * 0.3, rw * 0.15, 0.15, 0, Math.PI * 2);
            ctx.fill();

            ctx.globalAlpha = 1.0;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(rx, ry - 2, rw * 0.24, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.007; 
            ctx.clearRect(0, 0, width, height);

            drawRipples();
            particles.forEach(p => { p.update(); p.draw(); });
            fallingPetals.forEach(fp => { fp.update(); fp.draw(); });

            pointer.x += (pointer.targetX - pointer.x) * 0.05;
            pointer.y += (pointer.targetY - pointer.y) * 0.05;

            const swayOffsetX = (pointer.x - cx) * 0.18;
            const swayOffsetY = (pointer.y - cy) * 0.12;
            const totalSwayX = swayOffsetX + Math.sin(time * 0.7) * (baseScale * 0.04);
            const totalSwayY = swayOffsetY + Math.cos(time * 0.9) * (baseScale * 0.02);

            if (globalBloom.current < globalBloom.target) {
                globalBloom.current += globalBloom.speed;
                if (globalBloom.current > globalBloom.target) globalBloom.current = globalBloom.target;
            }

            drawLeaves(totalSwayX, totalSwayY);
            flowers.forEach(f => drawStem(f, totalSwayX, totalSwayY));
            drawWrappingPaper();

            flowers.forEach(f => {
                const fx = cx + f.offsetX + totalSwayX * (0.4 + f.zIndex * 0.05);
                const fy = cy + f.offsetY + totalSwayY * (0.4 + f.zIndex * 0.05);

                f.petals.forEach(p => {
                    if (p.index % 2 === 0) {
                        processSpring(p, fx, fy, f.scale);
                        drawPetal(f, p, fx, fy, totalSwayX, totalSwayY, globalBloom.current);
                    }
                });

                f.stamens.forEach(s => drawStamen(f, s, fx, fy, totalSwayX, totalSwayY, globalBloom.current));

                f.petals.forEach(p => {
                    if (p.index % 2 !== 0) {
                        processSpring(p, fx, fy, f.scale);
                        drawPetal(f, p, fx, fy, totalSwayX, totalSwayY, globalBloom.current);
                    }
                });

                ctx.save();
                ctx.translate(fx, fy);
                const pistilGrad = ctx.createRadialGradient(0,0,1, 0,0, f.scale * 0.06);
                
                if (f.type === 'pink') {
                    pistilGrad.addColorStop(0, '#ffb3c1');
                    pistilGrad.addColorStop(0.7, '#c9184a');
                } else if (f.type === 'yellow') {
                    pistilGrad.addColorStop(0, '#ffe57f');
                    pistilGrad.addColorStop(0.7, '#ffab00');
                } else {
                    pistilGrad.addColorStop(0, '#cbdcb9');
                    pistilGrad.addColorStop(0.7, '#5b7849');
                }
                pistilGrad.addColorStop(1, 'rgba(0,0,0,0)');
                
                ctx.beginPath();
                ctx.arc(0, 0, f.scale * 0.06, 0, Math.PI * 2);
                ctx.fillStyle = pistilGrad;
                ctx.fill();
                ctx.restore();
            });
        }

        function processSpring(petal, fx, fy, scale) {
            const force = (petal.springTarget - petal.springVal) * 0.06; 
            petal.springVel += force;
            petal.springVel *= 0.8; 
            petal.springVal += petal.springVel;
        }

        function trackInteraction(clientX, clientY) {
            isTouched = true;
            pointer.targetX = clientX;
            pointer.targetY = clientY;

            if (Math.random() < 0.15) {
                createRipple(clientX, clientY);
            }

            flowers.forEach(f => {
                const fx = cx + f.offsetX;
                const fy = cy + f.offsetY;
                const dX = clientX - fx;
                const dY = clientY - fy;
                const distance = Math.sqrt(dX * dX + dY * dY);

                if (distance < f.scale * 1.3) {
                    f.petals.forEach(p => {
                        p.springTarget = (1 - (distance / (f.scale * 1.3))) * 1.5;
                    });
                } else {
                    f.petals.forEach(p => p.springTarget = 0);
                }
            });
        }

        function clearSprings() {
            flowers.forEach(f => f.petals.forEach(p => p.springTarget = 0));
        }

        window.addEventListener('mousemove', (e) => trackInteraction(e.clientX, e.clientY));
        window.addEventListener('mouseleave', () => {
            isTouched = false; 
            pointer.targetX = cx; pointer.targetY = cy;
            clearSprings();
        });

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                trackInteraction(e.touches[0].clientX, e.touches[0].clientY);
                createRipple(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) trackInteraction(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        window.addEventListener('touchend', () => {
            isTouched = false; pointer.targetX = cx; pointer.targetY = cy; clearSprings();
        });

        window.addEventListener('resize', resize);

        resize();
        animate();
    </script>
</body>
</html>
